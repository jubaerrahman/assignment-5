<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
<meta charset="UTF-8">
<title>GitHub Issues Tracker</title>

<link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100 flex items-center justify-center h-screen">

<div class="card w-96 bg-white shadow-lg p-6">

<div class="text-center mb-6">

<img src="assets/github-logo.png" class="w-14 mx-auto mb-3">

<h2 class="text-xl font-bold">GitHub Issues Tracker</h2>

<p class="text-gray-500 text-sm">
Sign in to manage your issues
</p>

</div>

<input id="username"
type="text"
placeholder="Enter Username"
class="input input-bordered w-full mb-2">

<p class="text-xs text-blue-500 mb-3">Default: admin</p>

<input id="password"
type="password"
placeholder="Enter Password"
class="input input-bordered w-full mb-2">

<p class="text-xs text-blue-500 mb-4">Default: admin123</p>

<button onclick="login()" class="btn btn-primary w-full">
Sign In
</button>

<div class="divider">OR</div>

<div class="bg-gray-100 rounded p-3 text-center text-sm">
<p>Demo Credentials</p>
<p>Username: admin</p>
<p>Password: admin123</p>
</div>

</div>

<script src="js/login.js"></script>

</body>
</html>
